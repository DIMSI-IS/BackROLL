# TODO ssh keys

version: "3.9"

services:

  database:
    image: 'mariadb:10.3'
    volumes:
      - database:/var/lib/mysql/
    env_file:
      - database/env
    expose:
      - 3306

  sso:
    build: ./sso
    env_file:
      - ./sso/env
    ports:
      - 8081:8080
      - 9990:9990

  redis:
    image: redis:7.2
    command: "redis-server"
    expose:
      - 6379

  api:
    build: ../src/core
    command: "python3 run.py"
    volumes:
      - ../src/core:/usr/src/app
      - ../common/secret/:/root/.ssh:ro
    env_file:
      - api/env
    environment:
      - OPENID_ISSUER=http://${HOST_IP}:8081/realms/backroll
    expose:
      - 5050
    ports:
      - 5050:5050
    depends_on:
      - redis

  worker_primary:
    build: ../src/core
    command: celery -A app.celery worker -n worker -Q default --concurrency=4 --loglevel=info && chmod -R 600 ~/.ssh && chmod 644 ~/.ssh/id_rsa.pub && chmod 644 ~/.ssh/config && chown root:$USER ~/.ssh/config
    volumes:
      - ../common/secret/:/root/.ssh
      - /mnt:/mnt
      - ../src/core:/usr/src/app
    env_file:
      - api/env
    environment:
      - OPENID_ISSUER=http://${HOST_IP}:8081/realms/backroll
    depends_on:
      - api

  worker_secondary:
    build: ../src/core
    command: celery -A app.celery worker -n worker2 -Q backup_tasks --concurrency=2 --loglevel=info && chmod -R 600 ~/.ssh && chmod 644 ~/.ssh/id_rsa.pub && chmod 644 ~/.ssh/config && chown root:$USER ~/.ssh/config
    volumes:
      - ../common/secret/:/root/.ssh
      - /mnt:/mnt
      - ../src/core:/usr/src/app
    env_file:
      - api/env
    environment:
      - OPENID_ISSUER=http://${HOST_IP}:8081/realms/backroll
    depends_on:
      - api
      - worker_primary

  flower:
    build: ../src/core
    command: celery -A app.celery flower --conf=flowerconfig.py --loglevel=info
    volumes:
      - ../flower:/root/flower
      - ../src/core:/usr/src/app
    env_file:
      - api/env
    environment:
      - OPENID_ISSUER=http://${HOST_IP}:8081/realms/backroll
    expose:
      - 5555
    ports:
      - 5555:5555
    depends_on:
      - api
      - worker_primary

  beat:
    build: ../src/core
    command: celery -A app.celery beat -S redbeat.RedBeatScheduler --loglevel=info
    volumes:
      - ../src/core:/usr/src/app
    env_file:
      - api/env
    environment:
      - OPENID_ISSUER=http://${HOST_IP}:8081/realms/backroll
    depends_on:
      - api
      - worker_secondary

  front:
    build:
      context: ../src/ui
      dockerfile: dev.Dockerfile
    volumes:
      - ../src/ui/src:/app/src
    env_file:
      - front/env
    environment:
      - OPENID_ISSUER=http://${HOST_IP}:8081
    ports:
      - 8080:8080
    depends_on:
      - api

volumes:
  database:
